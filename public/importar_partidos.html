<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Importar Partidos</title>

  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/importar_partidos.js" defer></script>
</head>

<body class="app-body">

  <main class="mobile-shell wide-shell">

    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">API Football</p>
          <h1>Importar Partidos</h1>
        </div>

        <div class="app-logo">🌎</div>
      </div>

      <p class="hero-text">
        Busca partidos reales por fecha y filtra por torneo.
      </p>
    </section>

    <section class="app-panel">

      <div class="two-column">

        <div>
          <label class="field-label" for="fechaInput">Fecha</label>
          <input type="date" id="fechaInput" />
        </div>

        <div>
          <label class="field-label" for="torneoSelect">Torneo</label>

          <select id="torneoSelect">
            <option value="">Todos los torneos</option>

            <option value="Liga MX">México - Liga MX</option>
            <option value="Primera División">Costa Rica - Primera División</option>
            <option value="Liga Nacional">Honduras / Guatemala - Liga Nacional</option>
            <option value="Primera Division">El Salvador - Primera División</option>
            <option value="LPF">Panamá - LPF</option>

            <option value="Liga Profesional Argentina">Argentina - Liga Profesional</option>
            <option value="Serie A">Brasil / Italia - Serie A</option>

            <option value="Premier League">Premier League</option>
            <option value="La Liga">La Liga</option>
            <option value="Bundesliga">Bundesliga</option>
            <option value="Ligue 1">Ligue 1</option>

            <option value="UEFA Champions League">UEFA Champions League</option>
            <option value="UEFA Europa League">UEFA Europa League</option>

            <option value="CONMEBOL Libertadores">CONMEBOL Libertadores</option>
            <option value="CONMEBOL Sudamericana">CONMEBOL Sudamericana</option>
            <option value="CONCACAF">CONCACAF Champions Cup</option>

            <option value="Major League Soccer">MLS</option>

            <option value="custom">Buscar por texto</option>
          </select>
        </div>

      </div>

      <div id="customLeagueBox" style="display:none;margin-top:16px;">
        <label class="field-label" for="customLeagueNameInput">Texto del torneo</label>
        <input
          type="text"
          id="customLeagueNameInput"
          placeholder="Ej: Copa, Apertura, Libertadores, Champions"
        />
      </div>

      <div style="margin-top:20px;">
        <button id="buscarPartidosButton" type="button">
          Buscar Partidos
        </button>
      </div>

      <p class="helper-text">
        Este método busca todos los partidos de la fecha y luego filtra por nombre del torneo.
      </p>

    </section>

    <section class="app-panel">
      <h2>Partidos Disponibles</h2>

      <div id="estadoBusqueda" class="info-card" style="display:none;"></div>

      <div id="partidosContainer" class="matches-container"></div>
    </section>

    <section class="app-panel">

      <h2>Crear Jornada</h2>

      <div class="two-column">

        <div>
          <label class="field-label" for="nombreJornadaInput">Nombre Jornada</label>
          <input type="text" id="nombreJornadaInput" placeholder="Ej: Jornada34" />
        </div>

        <div>
          <label class="field-label" for="fechaCierreInput">Fecha de cierre</label>
          <input type="datetime-local" id="fechaCierreInput" />
        </div>

      </div>

      <button id="crearJornadaButton" type="button">
        Crear Jornada desde API
      </button>

      <button onclick="window.location.href='adminmode.html'" class="ghost-button" type="button">
        Volver
      </button>

    </section>

  </main>

  <nav class="bottom-nav">
    <a href="index.html">🏠<span>Inicio</span></a>
    <a href="ver_jornadas.html">📅<span>Jornadas</span></a>
    <a href="resultados-totales.html">🏆<span>Tabla</span></a>
    <a href="adminmode.html" class="active">⚙️<span>Admin</span></a>
  </nav>

</body>
</html>
