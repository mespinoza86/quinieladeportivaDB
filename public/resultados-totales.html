<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Resultados Totales</title>

  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/resultados-totales.js"></script>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      const boton = document.getElementById("calcularResultados");
      if (boton) {
        boton.click();
      }
    }, 500);
  });
</script>

</head>

<body class="app-body">

  <main class="mobile-shell wide-shell">

    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Clasificación</p>
          <h1>Tabla General</h1>
        </div>
        <div class="app-logo">🏆</div>
      </div>

      <p class="hero-text">
        Consulta el acumulado de puntos por jugador y calcula los resultados generales.
      </p>
    </section>

    <section class="app-panel">
      <div class="section-title-row">
        <div>
          <h2>Resultados totales</h2>
          <p class="helper-text">Desliza horizontalmente para ver todas las jornadas.</p>
        </div>
      </div>

      <button id="calcularResultados">Calcular Resultados</button>

      <div id="tablaContainer" class="tabla-contenedor">
        <table id="resultadosTotalesTable">
          <thead>
            <tr>
              <th>Jugador</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>
      </div>

      <button id="volverButton" class="ghost-button">Volver</button>
    </section>

  </main>

  <nav class="bottom-nav">
    <a href="index.html">🏠<span>Inicio</span></a>
    <a href="ver_jornadas.html">📅<span>Jornadas</span></a>
    <a href="resultados-totales.html" class="active">🏆<span>Tabla</span></a>
    <a href="adminmode.html">⚙️<span>Admin</span></a>
  </nav>

  <script>
    document.getElementById('volverButton').addEventListener('click', () => {
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
